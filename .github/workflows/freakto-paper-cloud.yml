name: Freakto Paper Cloud Cycle

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run focused cloud tests before the cycle
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "9 0,4,8,12,16,20 * * *"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"
  PYTHONPATH: ${{ github.workspace }}
  TZ: "UTC"
  FREAKTO_CLOUD: "1"
  LIVE_TRADING_ENABLED: "false"
  REAL_CAPITAL_ENABLED: "false"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GAPGPT_API_KEY: ${{ secrets.GAPGPT_API_KEY }}
  COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}

concurrency:
  group: freakto-paper-cloud-cycle
  cancel-in-progress: false

jobs:
  paper-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Verify required cloud files
        shell: bash
        run: |
          set -euo pipefail
          pwd
          python --version
          python - <<'PY'
          from pathlib import Path

          required = (
              "cloud_state_sync.py",
              "github_cloud_runner.py",
              "paper_research_orchestrator.py",
              "paper_trade_launch_dashboard.py",
              "paper_performance_dashboard.py",
              "engine/paper_performance_dashboard.py",
              "tests/test_cloud_state_sync.py",
              "tests/test_github_cloud_runner.py",
          )
          missing = [item for item in required if not Path(item).is_file()]
          print({"required_files": list(required), "missing": missing})
          if missing:
              raise SystemExit("Missing required cloud files: " + ", ".join(missing))
          PY

      - name: Restore persistent paper state
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .cloud-state
          mkdir -p .cloud-state
          if git ls-remote --exit-code --heads origin paper-state >/dev/null 2>&1; then
            git fetch --depth=1 origin paper-state
            if ! git cat-file -e FETCH_HEAD:cloud_state.tar.gz; then
              echo "paper-state exists but cloud_state.tar.gz is missing" >&2
              exit 1
            fi
            git show FETCH_HEAD:cloud_state.tar.gz > .cloud-state/cloud_state.tar.gz
            test -s .cloud-state/cloud_state.tar.gz
            python cloud_state_sync.py restore --root . --archive .cloud-state/cloud_state.tar.gz
          else
            echo "No paper-state branch exists yet; starting with an empty cloud state."
          fi

      - name: Validate cloud runner tests
        if: ${{ github.event_name == 'schedule' || inputs.run_tests }}
        run: |
          python -m pytest -q tests/test_cloud_state_sync.py tests/test_github_cloud_runner.py tests/test_cloud_workflow_state_persistence.py tests/test_scheduled_paper_workflow.py tests/test_paper_performance_dashboard.py

      - name: Run one paper research cycle
        id: cycle
        run: |
          python -X utf8 -m freakto.paper.cloud_runner

      - name: Pack persistent paper state
        if: always()
        run: |
          mkdir -p .cloud-state
          python cloud_state_sync.py pack \
            --root . \
            --archive .cloud-state/cloud_state.tar.gz \
            --manifest .cloud-state/cloud_state_manifest.json

      - name: Upload cycle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freakto-paper-cycle-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            logs/cloud_runner/**
            logs/paper_cycle/**
            logs/paper_launch_v2/**
            logs/paper_trading/**
            logs/paper_performance/**
            .cloud-state/cloud_state_manifest.json

      - name: Persist state to paper-state branch
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SOURCE_STATE_DIR="${GITHUB_WORKSPACE}/.cloud-state"
          ARCHIVE_SOURCE="${SOURCE_STATE_DIR}/cloud_state.tar.gz"
          MANIFEST_SOURCE="${SOURCE_STATE_DIR}/cloud_state_manifest.json"

          test -s "$ARCHIVE_SOURCE"
          test -s "$MANIFEST_SOURCE"

          ROOT_TMP="$(mktemp -d)"
          trap 'rm -rf "$ROOT_TMP"' EXIT

          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          MAX_PUSH_ATTEMPTS=3

          for attempt in $(seq 1 "$MAX_PUSH_ATTEMPTS"); do
            STATE_REPO="${ROOT_TMP}/attempt-${attempt}"
            mkdir -p "$STATE_REPO"
            cd "$STATE_REPO"

            git init -b paper-state
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote add origin "$REMOTE_URL"

            if git ls-remote --exit-code --heads origin paper-state >/dev/null 2>&1; then
              git fetch --depth=1 origin paper-state
              git checkout -B paper-state FETCH_HEAD
            else
              git checkout --orphan paper-state
              if [ -n "$(git ls-files)" ]; then
                git rm -rf . >/dev/null
              fi
            fi

            # Copy only after the branch working tree is ready. This prevents
            # untracked files from blocking checkout on later workflow runs.
            cp "$ARCHIVE_SOURCE" ./cloud_state.tar.gz
            cp "$MANIFEST_SOURCE" ./cloud_state_manifest.json

            git add cloud_state.tar.gz cloud_state_manifest.json
            if git diff --cached --quiet; then
              echo "Cloud state unchanged; nothing to persist."
              exit 0
            fi

            git commit -m "chore: persist paper research cloud state [skip ci]"

            if git push origin HEAD:paper-state; then
              echo "Cloud state persisted successfully on attempt ${attempt}."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_PUSH_ATTEMPTS" ]; then
              echo "State push attempt ${attempt} failed; rebuilding from latest remote state."
              cd "$ROOT_TMP"
              rm -rf "$STATE_REPO"
              sleep $((attempt * 3))
            fi
          done

          echo "Unable to persist paper state after ${MAX_PUSH_ATTEMPTS} attempts." >&2
          exit 1
