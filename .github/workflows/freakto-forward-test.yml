name: Freakto Forward Test Collector

on:
  # Runs every 4 hours. GitHub schedules are not exact to the second,
  # but this is enough for Freakto forward-test collection on 4h candles.
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      send_telegram:
        description: "Send Telegram report"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      commit_logs:
        description: "Save logs to data-logs branch"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_validation:
        description: "Run validation suite after forward cycle"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FREAKTO_LOG_BRANCH: "data-logs"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

concurrency:
  group: freakto-forward-test
  cancel-in-progress: false

jobs:
  forward-test:
    name: Forward test cycle
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Restore previous Freakto logs
        run: |
          python -X utf8 scripts/github_actions_restore_logs.py

      - name: Show forward status before cycle
        run: |
          python -X utf8 forward_test_dashboard.py --status

      - name: Run Freakto forward cycle with Telegram
        if: ${{ github.event_name == 'schedule' || inputs.send_telegram == 'true' }}
        run: |
          python -X utf8 forward_test_dashboard.py --cycle --validate --continue-on-error --send

      - name: Run Freakto forward cycle without Telegram
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_telegram == 'false' }}
        run: |
          python -X utf8 forward_test_dashboard.py --cycle --validate --continue-on-error

      - name: Run validation suite explicitly
        if: ${{ always() && (github.event_name == 'schedule' || inputs.run_validation == 'true') }}
        run: |
          python -X utf8 validation_suite_dashboard.py || true

      - name: Build GitHub Actions health summary
        if: always()
        run: |
          python -X utf8 scripts/github_actions_health_summary.py || true

      - name: Run v6 pipeline health monitor
        if: always()
        run: |
          python -X utf8 pipeline_health_dashboard.py || true

      - name: Run v6.1 regime-gate matrix
        if: always()
        run: |
          python -X utf8 regime_gate_matrix_dashboard.py --compact || true

      - name: Run v6.2.1 forward regime label injection
        if: always()
        run: |
          python -X utf8 forward_regime_label_dashboard.py --compact || true

      - name: Run v6.2 regime shadow gate activator
        if: always()
        run: |
          python -X utf8 regime_shadow_gate_dashboard.py --compact || true

      - name: Run v6.3 forward shadow coverage probe
        if: always()
        run: |
          python -X utf8 forward_shadow_coverage_dashboard.py --compact || true

      - name: Run v6.5 automatic event collector
        if: always()
        run: |
          python -X utf8 automatic_event_collector_dashboard.py --compact || true

      - name: Run v6.4 causal/event intelligence
        if: always()
        run: |
          python -X utf8 causal_intelligence_dashboard.py --compact || true

      - name: Run v7 market narrative engine
        if: always()
        run: |
          python -X utf8 market_narrative_dashboard.py --compact || true

      - name: Run v7.1 narrative decision conflict scoring
        if: always()
        run: |
          python -X utf8 narrative_decision_dashboard.py --compact || true

      - name: Upload logs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freakto-logs-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 30
          path: |
            logs/**/*.csv
            logs/**/*.json
            logs/**/*.md
            logs/**/*.txt
            logs/**/*.log
            logs/research/**/*.db
            logs/research_dashboard/**/*.html
            history/*.db

      - name: Push logs to data-logs branch
        if: ${{ always() && (github.event_name == 'schedule' || inputs.commit_logs == 'true') }}
        run: |
          python -X utf8 scripts/github_actions_push_logs.py
